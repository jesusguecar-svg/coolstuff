<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Insurance Practice Exam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

    <!-- VIEW 1: Welcome -->
    <section id="view-welcome" class="view active">
      <h1>Texas General Lines<br>Practice Exam</h1>
      <p class="subtitle">Life, Accident, Health &amp; HMO</p>

      <div class="stats-box" id="stats-box">
        <!-- Populated by app.js -->
      </div>

      <!-- Filter panel -->
      <div class="filter-panel" id="filter-panel">
        <button class="filter-toggle" id="filter-toggle">
          Filters &amp; Options <span class="filter-arrow" id="filter-arrow">&#9660;</span>
        </button>
        <div class="filter-body" id="filter-body">

          <fieldset class="filter-group">
            <legend>Difficulty</legend>
            <div class="toggle-row" id="difficulty-toggles">
              <label class="chip-toggle easy"><input type="checkbox" value="easy" checked><span>Easy</span></label>
              <label class="chip-toggle medium"><input type="checkbox" value="medium" checked><span>Medium</span></label>
              <label class="chip-toggle hard"><input type="checkbox" value="hard" checked><span>Hard</span></label>
            </div>
          </fieldset>

          <fieldset class="filter-group">
            <legend>Domains <button class="link-btn" id="domain-select-all">all</button> / <button class="link-btn" id="domain-select-none">none</button></legend>
            <div class="domain-checkboxes" id="domain-checkboxes">
              <!-- Populated by app.js -->
            </div>
          </fieldset>

          <fieldset class="filter-group">
            <legend>Session Options</legend>
            <label class="switch-label">
              <span>Skip previously answered</span>
              <input type="checkbox" id="opt-skip-answered">
            </label>
            <label class="switch-label">
              <span>Show answers at end only</span>
              <input type="checkbox" id="opt-deferred-feedback">
            </label>
          </fieldset>

        </div>
      </div>

      <div class="config-form">
        <label for="question-count">How many questions?</label>
        <div class="count-row">
          <input type="number" id="question-count" min="1" max="250" value="10">
          <span class="count-hint" id="count-hint">of 250</span>
        </div>
        <div class="quick-counts">
          <button class="quick-btn" data-count="10">10</button>
          <button class="quick-btn" data-count="25">25</button>
          <button class="quick-btn" data-count="50">50</button>
          <button class="quick-btn" data-count="100">100</button>
        </div>
        <div class="filter-warning" id="filter-warning">No questions match your filters.</div>
        <button class="btn btn-primary" id="btn-start">Start Practice Session</button>
      </div>
    </section>

    <!-- VIEW 2: Question -->
    <section id="view-question" class="view">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="question-meta">
        <span class="badge badge-domain" id="q-domain"></span>
        <span class="badge badge-difficulty" id="q-difficulty"></span>
        <span class="question-counter" id="q-counter"></span>
      </div>
      <div class="question-stem" id="q-stem"></div>
      <div class="options" id="q-options">
        <!-- 4 answer buttons inserted by app.js -->
      </div>
    </section>

    <!-- VIEW 3: Feedback -->
    <section id="view-feedback" class="view">
      <div class="progress-bar-container">
        <div class="progress-bar" id="feedback-progress-bar"></div>
      </div>
      <div class="question-meta">
        <span class="badge badge-domain" id="fb-domain"></span>
        <span class="badge badge-difficulty" id="fb-difficulty"></span>
        <span class="question-counter" id="fb-counter"></span>
      </div>
      <div class="question-stem" id="fb-stem"></div>
      <div class="feedback-banner" id="fb-banner"></div>
      <div class="explanation-box" id="fb-correct-box">
        <div class="explanation-label">Why <span id="fb-correct-label"></span> is correct:</div>
        <div class="explanation-text" id="fb-correct-text"></div>
      </div>
      <div id="fb-wrong-boxes">
        <!-- Wrong explanations inserted by app.js -->
      </div>
      <button class="btn btn-primary" id="btn-next">Next Question</button>
    </section>

    <!-- VIEW 4: Summary -->
    <section id="view-summary" class="view">
      <h2>Session Complete</h2>
      <div class="score-box" id="score-box"></div>
      <div class="domain-table-container">
        <h3>Domain Breakdown</h3>
        <table class="domain-table" id="domain-table">
          <thead>
            <tr><th>Domain</th><th>Score</th><th>%</th></tr>
          </thead>
          <tbody id="domain-tbody"></tbody>
        </table>
      </div>
      <div class="missed-section" id="missed-section">
        <h3>Questions to Review</h3>
        <div id="missed-list"></div>
      </div>
      <div class="deferred-review" id="deferred-review" style="display:none;">
        <h3>Question-by-Question Review</h3>
        <div id="deferred-review-list"></div>
      </div>
      <button class="btn btn-primary" id="btn-restart">Start New Session</button>
    </section>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/session.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

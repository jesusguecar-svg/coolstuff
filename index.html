<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>LexMap Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slatebg: '#020617',
              indigoaccent: '#4f46e5'
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="module">
      import React, { useEffect, useMemo, useState } from 'https://esm.sh/react@18.3.1';
      import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
      import htm from 'https://esm.sh/htm@3.1.1';
      import { ShieldCheck, Scale, BookOpen, Home, UserCircle2, Trophy, Flame } from 'https://esm.sh/lucide-react@0.469.0';
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
      import {
        getAuth,
        signInWithCustomToken,
        signInAnonymously,
        onAuthStateChanged
      } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
      import {
        doc,
        getFirestore,
        onSnapshot,
        setDoc
      } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

      const html = htm.bind(React.createElement);

      const CONCEPT_DATA = [
        {
          id: 'legitima_defensa_self_defense',
          domain: 'Criminal Law',
          category: 'Justification Defense',
          en: {
            civilTerm: 'Legítima Defensa',
            civilDef: 'Eximente de responsabilidad penal cuando se repele una agresión ilegítima, con necesidad racional del medio y falta de provocación suficiente.',
            civilAuthority: 'Código Penal Venezolano, Art. 65 (causas de justificación).',
            civilCaseLaw: 'TSJ, Sala de Casación Penal (criterios reiterados sobre proporcionalidad y necesidad racional).',
            usTerm: 'Self-Defense',
            usDef: 'Affirmative defense allowing reasonable force to prevent imminent unlawful harm.',
            usAuthority: 'Model Penal Code §3.04; common-law proportionality doctrine.',
            usCaseLaw: 'People v. Goetz, 68 N.Y.2d 96 (1986).',
            mbeTip: 'Imminence + proportionality; deadly force usually requires threat of death/serious bodily harm.',
            context: 'EQUIVALENT'
          }
        },
        {
          id: 'buen_padre_reasonable_person',
          domain: 'Torts',
          category: 'Standard of Care',
          en: {
            civilTerm: 'Buen Padre de Familia',
            civilDef: 'Estándar objetivo de diligencia exigible al deudor y al ciudadano medio para evitar causar daños.',
            civilAuthority: 'Código Civil Venezolano, Arts. 1.185 y ss. (responsabilidad civil por hecho ilícito).',
            civilCaseLaw: 'TSJ, Sala de Casación Civil (líneas sobre culpa leve y diligencia media).',
            usTerm: 'Reasonable Person Standard',
            usDef: 'Objective negligence benchmark: what a reasonably prudent person would do under similar circumstances.',
            usAuthority: 'Restatement (Second) of Torts §283.',
            usCaseLaw: 'Vaughan v. Menlove, 132 Eng. Rep. 490 (1837).',
            mbeTip: 'Default objective standard; watch for professional and child-standard exceptions.',
            context: 'EQUIVALENT'
          }
        },
        {
          id: 'limitaciones_propietario_trespassers',
          domain: 'Property',
          category: 'Premises Liability',
          en: {
            civilTerm: 'Responsabilidad del propietario frente a intrusos',
            civilDef: 'La obligación de reparar daños depende de la culpa y del nexo causal, con examen de previsibilidad y deber general de no dañar.',
            civilAuthority: 'Código Civil Venezolano, Art. 1.185 y régimen general de responsabilidad.',
            civilCaseLaw: 'TSJ, Sala de Casación Civil (criterios sobre guardián de la cosa y culpa concurrente).',
            usTerm: 'Duties Owed to Trespassers',
            usDef: 'Traditional rule limits landowner duties to refraining from willful/wanton harm, with narrow exceptions.',
            usAuthority: 'Restatement (Second) of Torts §§333–339.',
            usCaseLaw: 'Rowland v. Christian, 69 Cal.2d 108 (1968) (modern trend).',
            mbeTip: 'Know traditional entrant categories and the attractive-nuisance exception for children.',
            context: 'ANALOGOUS'
          }
        },
        {
          id: 'actividades_peligrosas_strict_liability',
          domain: 'Torts',
          category: 'Strict Liability',
          en: {
            civilTerm: 'Responsabilidad por actividades peligrosas',
            civilDef: 'Ciertos riesgos extraordinarios pueden generar deber de reparar aun con debate reducido sobre culpa, según construcción doctrinal y jurisprudencial.',
            civilAuthority: 'Código Civil Venezolano, Art. 1.185 (base general) + desarrollo jurisprudencial.',
            civilCaseLaw: 'TSJ, Sala de Casación Civil (aplicaciones de responsabilidad por riesgo creado).',
            usTerm: 'Strict Liability for Abnormally Dangerous Activities',
            usDef: 'Liability without fault when engaging in abnormally dangerous activities that cause harm.',
            usAuthority: 'Restatement (Second) of Torts §§519–520.',
            usCaseLaw: 'Rylands v. Fletcher, L.R. 3 H.L. 330 (1868).',
            mbeTip: 'Focus on abnormal risk and inability to eliminate risk through reasonable care.',
            context: 'ANALOGOUS'
          }
        }
      ];

      const ENV = (() => {
        try {
          const rawConfig =
            window.__firebase_config ||
            window.__FIREBASE_CONFIG ||
            window.FIREBASE_CONFIG ||
            null;

          const parsed = typeof rawConfig === 'string' ? JSON.parse(rawConfig) : rawConfig;
          return {
            firebaseConfig: parsed && typeof parsed === 'object' ? parsed : null,
            appId: window.__app_id || 'lexmap-pro'
          };
        } catch (error) {
          console.warn('Invalid firebase config payload:', error);
          return { firebaseConfig: null, appId: window.__app_id || 'lexmap-pro' };
        }
      })();

      function levelFromXp(xp) {
        return Math.max(1, Math.floor((xp || 0) / 150) + 1);
      }

      function Loader() {
        return html`<div className="min-h-screen grid place-items-center">
          <div className="text-center">
            <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p className="mt-4 text-slate-300">Authenticating LexMap Pro...</p>
          </div>
        </div>`;
      }

      function Header({ profile }) {
        const xp = profile?.xp || 0;
        const streak = profile?.streak || 0;
        return html`<header className="sticky top-0 z-20 border-b border-slate-700/70 bg-slate-900/70 backdrop-blur-md">
          <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div>
              <h1 className="font-semibold text-lg">LexMap Pro</h1>
              <p className="text-xs text-slate-400">Comparative Legal Intelligence Engine</p>
            </div>
            <div className="flex items-center gap-3 text-xs">
              <span className="inline-flex items-center gap-1 bg-indigo-500/20 px-2 py-1 rounded-full"><${Trophy} size=${14} /> XP ${xp}</span>
              <span className="inline-flex items-center gap-1 bg-orange-500/20 px-2 py-1 rounded-full"><${Flame} size=${14} /> Streak ${streak}</span>
              <span className="inline-flex items-center gap-1 bg-emerald-500/20 px-2 py-1 rounded-full">Level ${levelFromXp(xp)}</span>
            </div>
          </div>
        </header>`;
      }

      function Onboarding({ onStart }) {
        return html`<section className="min-h-screen grid place-items-center p-6">
          <div className="max-w-2xl w-full border border-slate-700 rounded-2xl bg-slate-900/80 p-8 text-center shadow-2xl">
            <${Scale} size=${44} className="mx-auto text-indigo-400" />
            <h2 className="text-3xl font-bold mt-4">Bridge Civil & Common Law</h2>
            <p className="mt-3 text-slate-300">Unlock concept bridges through micro-lessons comparing Venezuelan/Latin American legal doctrine with US Common Law.</p>
            <button onClick=${onStart} className="mt-6 px-6 py-3 bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all duration-500 rounded-xl font-medium">Start Learning</button>
          </div>
        </section>`;
      }

      function ConceptCard({ item, completed, onOpen }) {
        return html`<button onClick=${() => onOpen(item)} className="text-left border border-slate-700 rounded-xl bg-slate-900/70 p-4 hover:border-indigo-400 active:scale-95 transition-all duration-500">
          <div className="flex items-center justify-between gap-3">
            <p className="text-sm text-slate-400">${item.domain} · ${item.category}</p>
            <span className=${`text-xs px-2 py-1 rounded-full ${completed ? 'bg-emerald-500/20 text-emerald-300' : 'bg-indigo-500/20 text-indigo-300'}`}>
              ${completed ? 'Completed' : 'Available'}
            </span>
          </div>
          <h3 className="font-semibold mt-2">${item.en.civilTerm} ↔ ${item.en.usTerm}</h3>
          <p className="text-xs mt-2 text-slate-400">${item.en.context === 'EQUIVALENT' ? 'Direct Equivalent' : 'Analogous'} bridge</p>
        </button>`;
      }

      function LessonModal({ lesson, onClose, onComplete, completed }) {
        const [step, setStep] = useState(0);
        if (!lesson) return null;

        const steps = [
          html`<div>
            <h3 className="text-xl font-semibold">Civil View: ${lesson.en.civilTerm}</h3>
            <p className="mt-3 text-slate-200">${lesson.en.civilDef}</p>
            <p className="mt-3 text-sm text-slate-400"><strong>Authority:</strong> ${lesson.en.civilAuthority}</p>
            <p className="mt-2 text-sm text-slate-400"><strong>Case Law:</strong> ${lesson.en.civilCaseLaw}</p>
          </div>`,
          html`<div>
            <h3 className="text-xl font-semibold">Common Law View: ${lesson.en.usTerm}</h3>
            <p className="mt-3 text-slate-200">${lesson.en.usDef}</p>
            <p className="mt-3 text-sm text-slate-400"><strong>Authority:</strong> ${lesson.en.usAuthority}</p>
            <p className="mt-2 text-sm text-slate-400"><strong>Case Law:</strong> ${lesson.en.usCaseLaw}</p>
          </div>`,
          html`<div>
            <h3 className="text-xl font-semibold">Synthesis</h3>
            <p className="mt-3">Classification: <span className="font-medium">${lesson.en.context}</span></p>
            <p className="mt-3 text-slate-200">${lesson.en.mbeTip}</p>
          </div>`
        ];

        return html`<div className="fixed inset-0 z-30 bg-slate-950/90 backdrop-blur-sm p-4">
          <div className="max-w-3xl h-full mx-auto border border-slate-700 rounded-2xl bg-slate-900 p-6 flex flex-col">
            <div className="flex items-center justify-between">
              <p className="text-sm text-slate-400">Micro-Lesson · ${lesson.domain}</p>
              <button onClick=${onClose} className="text-slate-300 hover:text-white">Close</button>
            </div>
            <div className="mt-4 h-2 rounded-full bg-slate-800">
              <div className="h-full bg-indigo-500 rounded-full transition-all duration-500" style=${{ width: `${((step + 1) / 3) * 100}%` }}></div>
            </div>
            <div className="mt-6 flex-1 overflow-y-auto">${steps[step]}</div>
            <div className="flex items-center justify-between gap-2 mt-6">
              <button className="px-4 py-2 rounded-lg border border-slate-600 active:scale-95 transition-all duration-500" disabled=${step === 0} onClick=${() => setStep((s) => Math.max(0, s - 1))}>Back</button>
              ${step < 2
                ? html`<button className="px-4 py-2 rounded-lg bg-indigo-600 active:scale-95 transition-all duration-500" onClick=${() => setStep((s) => Math.min(2, s + 1))}>Next</button>`
                : html`<button className="px-4 py-2 rounded-lg ${completed ? 'bg-emerald-700' : 'bg-emerald-600'} active:scale-95 transition-all duration-500" onClick=${() => onComplete(lesson)}>${completed ? 'Reviewed' : 'Mark complete +50 XP'}</button>`}
            </div>
          </div>
        </div>`;
      }

      function App() {
        const [appCtx, setAppCtx] = useState({ loading: true, auth: null, db: null, uid: null, appId: ENV.appId, persistenceEnabled: true });
        const [profile, setProfile] = useState(null);
        const [activeTab, setActiveTab] = useState('home');
        const [activeLesson, setActiveLesson] = useState(null);

        useEffect(() => {
          let unsubAuth = () => {};
          let unsubProfile = () => {};

          if (!ENV.firebaseConfig) {
            let localProfile = null;
            try {
              localProfile = JSON.parse(localStorage.getItem('lexmap_profile') || 'null');
            } catch (error) {
              console.warn('Local profile parse failed:', error);
            }

            setProfile(localProfile);
            setAppCtx((prev) => ({ ...prev, loading: false, uid: 'local-user', persistenceEnabled: false }));
            return () => {};
          }

          const app = initializeApp(ENV.firebaseConfig);
          const auth = getAuth(app);
          const db = getFirestore(app);

          (async () => {
            try {
              const token = typeof window.__initial_auth_token === 'string' ? window.__initial_auth_token : null;
              if (token) {
                await signInWithCustomToken(auth, token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (error) {
              console.warn('Custom token sign-in failed; falling back to anonymous:', error);
              await signInAnonymously(auth);
            }

            unsubAuth = onAuthStateChanged(auth, (user) => {
              if (!user) {
                setAppCtx((prev) => ({ ...prev, loading: false, auth, db }));
                return;
              }

              const profileRef = doc(db, 'artifacts', ENV.appId, 'users', user.uid, 'profile', 'data');
              unsubProfile();
              unsubProfile = onSnapshot(profileRef, (snap) => {
                setProfile(snap.exists() ? snap.data() : null);
                setAppCtx((prev) => ({ ...prev, loading: false, auth, db, uid: user.uid }));
              });
            });
          })();

          return () => {
            unsubAuth();
            unsubProfile();
          };
        }, []);

        const completedLessons = useMemo(() => profile?.completedLessons || [], [profile]);

        const writeProfile = async (next) => {
          if (!appCtx.persistenceEnabled) {
            setProfile((prev) => {
              const resolved = { ...(prev || {}), ...next };
              try {
                localStorage.setItem('lexmap_profile', JSON.stringify(resolved));
              } catch (error) {
                console.warn('Local profile write failed:', error);
              }
              return resolved;
            });
            return;
          }

          if (!appCtx.db || !appCtx.uid) return;
          const profileRef = doc(appCtx.db, 'artifacts', appCtx.appId, 'users', appCtx.uid, 'profile', 'data');
          try {
            await setDoc(profileRef, next, { merge: true });
          } catch (error) {
            console.error('Profile write failed:', error);
          }
        };

        const handleStart = async () => {
          if (profile) return;
          await writeProfile({ xp: 0, streak: 1, completedLessons: [], displayName: 'Scholar' });
        };

        const completeLesson = async (lesson) => {
          const alreadyDone = completedLessons.includes(lesson.id);
          const nextCompleted = alreadyDone ? completedLessons : [...completedLessons, lesson.id];
          await writeProfile({
            ...profile,
            xp: (profile?.xp || 0) + (alreadyDone ? 0 : 50),
            streak: profile?.streak || 1,
            completedLessons: nextCompleted
          });
        };

        if (appCtx.loading) return html`<${Loader} />`;

        if (!profile) {
          return html`<${Onboarding} onStart=${handleStart} />`;
        }

        return html`<div className="pb-24">
          <${Header} profile=${profile} />
          <main className="max-w-5xl mx-auto px-4 py-5">
            ${!appCtx.persistenceEnabled && html`
              <section className="mb-4 border border-amber-500/40 bg-amber-500/10 rounded-xl p-4">
                <h3 className="font-semibold text-amber-300">Firebase config not detected</h3>
                <p className="text-sm text-amber-100 mt-1">Running in local mode with browser storage. To enable cloud sync/auth, provide <code>window.__firebase_config</code> (or <code>window.__FIREBASE_CONFIG</code>) and optionally <code>window.__initial_auth_token</code>.</p>
              </section>
            `}
            ${activeTab === 'home' && html`
              <section className="grid gap-3">
                <h2 className="text-xl font-semibold">Concept Bridges</h2>
                <p className="text-slate-400 text-sm">Unlock micro-lessons comparing Venezuelan/Latin American Civil Law and US Common Law.</p>
                <div className="grid md:grid-cols-2 gap-3 mt-2">
                  ${CONCEPT_DATA.map((item) => html`<${ConceptCard}
                    key=${item.id}
                    item=${item}
                    completed=${completedLessons.includes(item.id)}
                    onOpen=${setActiveLesson}
                  />`)}
                </div>
              </section>
            `}
            ${activeTab === 'profile' && html`
              <section className="border border-slate-700 rounded-xl bg-slate-900/80 p-5">
                <h2 className="text-xl font-semibold">Profile</h2>
                <p className="text-slate-300 mt-2">Display Name: ${profile?.displayName || 'Scholar'}</p>
                <p className="text-slate-300">Completed Lessons: ${completedLessons.length}/${CONCEPT_DATA.length}</p>
                <p className="text-slate-300">Progress model: +50 XP per new lesson.</p>
              </section>
            `}
          </main>

          <${LessonModal}
            lesson=${activeLesson}
            completed=${activeLesson ? completedLessons.includes(activeLesson.id) : false}
            onClose=${() => setActiveLesson(null)}
            onComplete=${completeLesson}
          />

          <nav className="fixed bottom-0 left-0 right-0 border-t border-slate-700/70 bg-slate-900/80 backdrop-blur-md">
            <div className="max-w-5xl mx-auto px-4 py-2 grid grid-cols-2 gap-2">
              <button onClick=${() => setActiveTab('home')} className=${`flex items-center justify-center gap-2 py-2 rounded-lg active:scale-95 transition-all duration-500 ${activeTab === 'home' ? 'bg-indigo-600' : 'bg-slate-800'}`}><${Home} size=${16} /> Home</button>
              <button onClick=${() => setActiveTab('profile')} className=${`flex items-center justify-center gap-2 py-2 rounded-lg active:scale-95 transition-all duration-500 ${activeTab === 'profile' ? 'bg-indigo-600' : 'bg-slate-800'}`}><${UserCircle2} size=${16} /> Profile</button>
            </div>
          </nav>
        </div>`;
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch((err) => {
            console.warn('Service worker registration failed:', err);
          });
        });
      }

      createRoot(document.getElementById('root')).render(html`<${App} />`);
    </script>
  </body>
</html>

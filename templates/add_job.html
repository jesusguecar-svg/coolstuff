{% extends "base.html" %}
{% block title %}Add Job - Job Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add New Job</h1>
</div>

<div class="card form-card">
    <form method="post" action="/jobs/add">
        <div class="form-grid">
            <div class="form-group">
                <label for="title">Job Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Immigration Paralegal">
            </div>
            <div class="form-group">
                <label for="company">Company *</label>
                <input type="text" id="company" name="company" required placeholder="e.g. Smith & Associates">
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g. Dallas, TX">
            </div>
            <div class="form-group">
                <label for="salary">Salary</label>
                <input type="text" id="salary" name="salary" placeholder="e.g. $50,000 - $65,000">
            </div>
            <div class="form-group full-width">
                <label for="url">Job URL</label>
                <input type="url" id="url" name="url" placeholder="https://...">
            </div>
            <div class="form-group full-width">
                <label for="description">Job Description</label>
                <textarea id="description" name="description" rows="8" placeholder="Paste the full job description here..."></textarea>
            </div>
            <div class="form-group">
                <label for="category">Category <span class="text-muted">(auto-detected if blank)</span></label>
                <select id="category" name="category">
                    <option value="">Auto-detect</option>
                    {% for key, name in categories.items() %}
                    <option value="{{ key }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Job</button>
            <a href="/jobs" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">JT</a>
            <div class="nav-links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/jobs" class="{% if '/jobs' in request.path and '/add' not in request.path %}active{% endif %}">Jobs</a>
                <a href="/jobs/add" class="{% if '/add' in request.path %}active{% endif %}">Add Job</a>
                <a href="/import" class="{% if '/import' in request.path %}active{% endif %}">Import</a>
                <a href="/resume" class="{% if '/resume' in request.path %}active{% endif %}">Resumes</a>
            </div>
        </div>
    </nav>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">
            {{ message }}
            <button class="flash-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
